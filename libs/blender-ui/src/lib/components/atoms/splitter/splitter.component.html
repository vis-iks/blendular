<div
  #container
  class="bui-splitter"
  [class.horizontal]="orientation() === 'horizontal'"
  [class.vertical]="orientation() === 'vertical'"
  [class.dragging]="dragging()"
  [class.disabled]="disabled()"
>
  <!-- First pane -->
  <div
    class="bui-pane first-pane"
    [style.flex-basis.%]="firstPaneSize()"
    [style.min-width.%]="orientation() === 'horizontal' ? minFirstPaneSize() : null"
    [style.min-height.%]="orientation() === 'vertical' ? minFirstPaneSize() : null"
  >
    <ng-content select="[first]"></ng-content>
  </div>

  <!-- Divider / gutter -->
  <div
    class="bui-divider"
    (mousedown)="onDividerMouseDown($event)"
  >
    <div class="divider-handle"></div>
  </div>

  <!-- Second pane -->
  <div
    class="bui-pane second-pane"
    [style.min-width.%]="orientation() === 'horizontal' ? minSecondPaneSize() : null"
    [style.min-height.%]="orientation() === 'vertical' ? minSecondPaneSize() : null"
  >
    <ng-content select="[second]"></ng-content>
  </div>
</div>
