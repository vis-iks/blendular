<!-- Slider mode: drag to change value -->
@if (!editing()) {
  <div
    class="bui-slider-container"
    [class.dragging]="dragging()"
    [class.disabled]="disabled()"
    [class.progress-variant]="variant() === 'progress'"
    (mousedown)="onMouseDown($event)"
  >
    <!-- Progress fill bar -->
    <div class="bui-slider-fill" [style.width]="progressWidth()"></div>

    <!-- Arrows (show on hover via CSS) -->
    <div class="bui-slider-arrow left" (mousedown)="$event.stopPropagation()" (click)="decrement($event)">
      <span class="bl-icons-rightarrow_thin" style="display:inline-block;transform:rotate(180deg)"></span>
    </div>

    <!-- Internal label (XYZ) -->
    @if (internalLabel()) {
      <span class="bui-slider-internal-label">{{ internalLabel() }}</span>
    }

    <!-- Label on the left (external) -->
    @if (label()) {
      <span class="bui-slider-label">{{ label() }}</span>
    }

    <!-- Value display -->
    <span class="bui-slider-value" 
      [class.centered]="(!internalLabel() && !label() && !suffix())"
      [class.right-aligned]="!!internalLabel() || !!label() || !!suffix()"
    >{{ displayValue() }}{{ suffix() }}</span>

    <div class="bui-slider-arrow right" (mousedown)="$event.stopPropagation()" (click)="increment($event)">
      <span class="bl-icons-rightarrow_thin"></span>
    </div>
  </div>
} @else {
  <!-- Edit mode: direct text input -->
  <input
    #editInput
    type="text"
    class="bui-slider-edit"
    (keydown)="onEditKeydown($event)"
    (blur)="onEditBlur($event)"
  />
}
