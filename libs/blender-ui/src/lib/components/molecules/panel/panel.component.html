<div class="bui-panel" [class.collapsed]="!expanded()" [class.sub-panel]="isSub()" [class.unchecked]="hasCheckbox() && !checked()">
  <!-- Header -->
<div class="bui-panel-header" (click)="toggle()">
    <span class="chevron bl-icons-rightarrow_thin" [class.is-sub]="isSub()" [class.rotated]="expanded()"></span>
    
    @if (hasCheckbox()) {
      <div class="header-checkbox-wrapper" (click)="$event.stopPropagation()">
        <bui-checkbox [checked]="checked()" (checkedChange)="checked.set($event)"></bui-checkbox>
      </div>
    }

    @if (icon()) {
      <span class="header-icon" [ngClass]="'bl-icons-' + icon()"></span>
    }
    <span class="header-title" [class.is-sub]="isSub()">{{ title() }}</span>

    @if (shouldShowDragHandle()) {
      <span class="drag-grip" cdkDragHandle>⠿</span>
    }
  </div>

  <!-- Body (collapsible content) -->
  @if (expanded()) {
    <div class="bui-panel-body" [class.content-disabled]="hasCheckbox() && !checked()">
      <ng-content></ng-content>
    </div>
  }
</div>
