<div class="bui-layout-container">
  <aside class="bui-sidebar">
    <div class="bui-sidebar-header">
      <h2>Blendular Workbench Catalog</h2>
    </div>
    <nav class="bui-sidebar-nav">
      @for (category of categories; track category.name) {
      <div class="bui-nav-category">
        <h3 class="bui-nav-category-title">{{ category.name }}</h3>
        <ul class="bui-nav-list">
          @for (link of category.links; track link.path) {
          <li class="bui-nav-item">
            <a
              [routerLink]="link.path"
              routerLinkActive="active"
              class="bui-nav-link"
            >
              {{ link.label }}
            </a>
          </li>
          }
        </ul>
      </div>
      }
    </nav>
  </aside>
  
  <main class="bui-main-content">
    <router-outlet></router-outlet>
  </main>
</div>
